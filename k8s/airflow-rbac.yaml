# Lets the Airflow scheduler SA (where LocalExecutor tasks run) launch and
# monitor pods in tsd — needed for KubernetesPodOperator (the Spark batch task).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pod-launcher
  namespace: tsd
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-pod-launcher
  namespace: tsd
subjects:
  - kind: ServiceAccount
    name: airflow-scheduler
    namespace: tsd
roleRef:
  kind: Role
  name: airflow-pod-launcher
  apiGroup: rbac.authorization.k8s.io

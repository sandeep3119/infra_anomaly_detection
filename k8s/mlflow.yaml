apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: tsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: tsd-mlflow:latest
          imagePullPolicy: IfNotPresent
          # MLflow 3.5+ host validation needs explicit allowed hosts (incl. host:port
          # due to upstream bug #22095) — same lesson as TSD-006.
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: tsd
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000

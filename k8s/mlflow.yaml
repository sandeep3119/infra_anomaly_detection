apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: tsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: tsd-mlflow:latest
          imagePullPolicy: IfNotPresent
          # MLflow 3.5+ host validation needs explicit allowed hosts (incl. host:port
          # due to upstream bug #22095) — same lesson as TSD-006.
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
            # S3 (MinIO) artifact store — server writes/serves artifacts here.
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 90 
            periodSeconds: 30
            failureThreshold: 6 
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: tsd
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000

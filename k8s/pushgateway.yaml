# Prometheus Pushgateway — batch jobs push metrics here; Prometheus scrapes it.
# Batch jobs exit, so they can't be scraped directly; the gateway holds the last push.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: tsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway:latest
          ports:
            - containerPort: 9091
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: tsd
spec:
  selector:
    app: pushgateway
  ports:
    - port: 9091
      targetPort: 9091

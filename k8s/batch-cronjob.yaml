apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-score-cron
  namespace: tsd
spec:
  schedule: "0 2 * * 0"          # weekly — Sundays at 02:00
  concurrencyPolicy: Forbid      # never overlap runs; skip a tick if the previous is still going
  successfulJobsHistoryLimit: 3  # keeping last 3 successful Jobs for inspection
  failedJobsHistoryLimit: 1      # keeping last 1 failed Job for debugging
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: batch-score
              image: tsd-batch:latest
              imagePullPolicy: IfNotPresent
              args:
                - "--fleet_path"
                - "s3a://tsd/fleet"
                - "--out_path"
                - "s3a://tsd/reports"
              env:
                - name: S3_ENDPOINT
                  value: "http://minio:9000"
                - name: S3_ACCESS_KEY
                  value: "minioadmin"
                - name: S3_SECRET_KEY
                  value: "minioadmin"
                - name: MLFLOW_TRACKING_URI
                  value: "http://mlflow:5000"
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"
                limits:
                  memory: "4Gi"

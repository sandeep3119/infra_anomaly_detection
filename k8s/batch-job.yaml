# One-shot batch scoring run (see batch-cronjob.yaml for the scheduled version).
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-score
  namespace: tsd
spec:
  backoffLimit: 1          # retry at most once on failure
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: batch-score
          image: tsd-batch:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--fleet_path"
            - "s3a://tsd/fleet"
            - "--out_path"
            - "s3a://tsd/reports"
          env:
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: S3_ACCESS_KEY
              value: "minioadmin"
            - name: S3_SECRET_KEY
              value: "minioadmin"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"

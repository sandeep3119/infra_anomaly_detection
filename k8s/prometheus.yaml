# Prometheus — config supplied via ConfigMap (the K8s way to inject prometheus.yml).
# Scrape targets are in-cluster Service DNS names (same namespace -> short names).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: tsd
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'inference'
        static_configs:
          - targets: ['inference.tsd.svc.cluster.local:8000']
      - job_name: 'drift_runner'
        static_configs:
          - targets: ['drift-runner.tsd.svc.cluster.local:8001']
      - job_name: 'pushgateway'
        honor_labels: true
        static_configs:
          - targets: ['pushgateway.tsd.svc.cluster.local:9091']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: tsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: tsd
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

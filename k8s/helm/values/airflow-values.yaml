# Celery/observability-related disabled to keep the footprint small.
executor: LocalExecutor

# S3 (MinIO) config so the retraining client can upload MLflow artifacts.
env:
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin"

# Custom image: base Airflow 3.2.2 + ML deps + project src (for DAG A tasks).
images:
  airflow:
    repository: tsd-airflow
    tag: latest
    pullPolicy: IfNotPresent


redis:
  enabled: false
flower:
  enabled: false
workers:
  replicas: 0

# Trim non-essential components for a demo cluster.
statsd:
  enabled: false
triggerer:
  enabled: false          # no deferrable operators in our DAGs
dagProcessor:
  enabled: true           # REQUIRED in Airflow 3.x — it parses DAGs (scheduler no longer does)

# Bundled Postgres for the metadata DB
postgresql:
  enabled: true


scheduler:
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { memory: 1Gi }
webserver:
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { memory: 1Gi }
  service:
    type: ClusterIP        # reach via kubectl port-forward

# DAGs pulled from the repo's dags/ folder via git-sync
dags:
  gitSync:
    enabled: true
    repo: https://github.com/sandeep3119/infra_anomaly_detection.git
    branch: master
    subPath: dags
    wait: 60

global:
  scrape_interval: 15s     # How often to fetch metrics from targets
  evaluation_interval: 15s # How often to evaluate alerting rules

scrape_configs:
  - job_name: 'inference'
    static_configs:
      - targets: ['inference:8000']
  - job_name: 'drift_runner'
    static_configs:
      - targets: ['drift_runner:8001']